name: lint

on:
  pull_request:
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 3
  TERM: xterm

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        filter: 'tree:0'
        persist-credentials: false
        show-progress: false

    - name: Add actionlint problem matcher
      run: echo "::add-matcher::.github/actionlint-matcher.json"

    - name: Lint workflows
      uses: grafana/grafana-github-actions/actionlint@ea6ae56f0c8cee10e6538c6e395f5dc1072bf3a2 # actionlint 1.7.11
      with:
        args: -color

    - name: Lint markdown
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
      with:
        config: '.markdownlint.yaml'
        globs: |
          **/*.md

    - name: Install markdown-link-check
      env:
        # renovate: datasource=npm depName=markdown-link-check packageName=markdown-link-check
        MARKDOWN_LINK_CHECK_VERSION: 3.14.2
      run: sudo npm install -g "markdown-link-check@${MARKDOWN_LINK_CHECK_VERSION}"

    - name: Check markdown links
      run: "find . -name '*.md' -print0 | xargs -0 -n1 markdown-link-check --config .markdown_link_check_config.json"
